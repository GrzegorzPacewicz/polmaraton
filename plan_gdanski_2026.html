<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Półmaraton Gdański 2026 — Plan Treningowy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #08101E;
  --surface:   #0F1B2D;
  --card:      #142035;
  --border:    #1C2E45;
  --cyan:      #00D4FF;
  --cyan-dim:  rgba(0,212,255,0.12);
  --orange:    #FF6B35;
  --orange-dim:rgba(255,107,53,0.12);
  --green:     #3DD68C;
  --green-dim: rgba(61,214,140,0.1);
  --yellow:    #FFD166;
  --yellow-dim:rgba(255,209,102,0.12);
  --red:       #FF4D6D;
  --red-dim:   rgba(255,77,109,0.1);
  --text:      #E2EAF4;
  --muted:     #4E6A8A;
  --subtle:    #243447;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── HEADER ── */
.site-header {
  padding: 40px 24px 32px;
  max-width: 960px;
  margin: 0 auto;
  border-bottom: 1px solid var(--border);
}

.eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 8px;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(32px, 7vw, 64px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 16px;
}

h1 em {
  font-style: normal;
  color: var(--cyan);
}

.header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 16px;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
}

.meta-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.meta-value.accent { color: var(--cyan); }

/* countdown */
.countdown {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
  padding: 12px 18px;
  background: var(--cyan-dim);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 10px;
  width: fit-content;
}

.cd-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 40px;
  font-weight: 900;
  color: var(--cyan);
  line-height: 1;
}

.cd-unit {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.cd-sep {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px;
  color: var(--subtle);
  margin: 0 4px;
}

/* ── LEGEND ── */
.legend {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 24px 0;
}

.legend-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.legend-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.legend-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid transparent;
}

.chip-bs   { background: rgba(100,160,220,0.12); color: #7AABDC; border-color: rgba(100,160,220,0.2); }
.chip-zb   { background: var(--orange-dim); color: var(--orange); border-color: rgba(255,107,53,0.2); }
.chip-bnp  { background: var(--yellow-dim); color: var(--yellow); border-color: rgba(255,209,102,0.2); }
.chip-p    { background: var(--green-dim); color: var(--green); border-color: rgba(61,214,140,0.2); }
.chip-test { background: var(--red-dim); color: var(--red); border-color: rgba(255,77,109,0.2); }

/* ── PROGRESS ── */
.progress-wrap {
  max-width: 960px;
  margin: 20px auto 0;
  padding: 0 24px;
}

.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}

.progress-track {
  height: 3px;
  background: var(--subtle);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 3px;
  transition: width .6s ease;
}

/* ── FAZY ── */
.plan {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 24px 60px;
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 6px;
  margin-top: 28px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.phase-icon {
  font-size: 16px;
}

.phase-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.phase-1 .phase-title { color: var(--orange); }
.phase-2 .phase-title { color: var(--yellow); }
.phase-3 .phase-title { color: var(--green); }
.phase-4 .phase-title { color: var(--red); }
.phase-5 .phase-title { color: var(--cyan); }

/* ── WEEK CARD ── */
.week-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .2s;
}

.week-card:hover { border-color: var(--subtle); }
.week-card.current { border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan-dim), 0 4px 20px rgba(0,212,255,.06); }
.week-card.done { opacity: .45; }

/* Phase accent strip */
.week-card.p1 { border-left: 3px solid var(--orange); }
.week-card.p2 { border-left: 3px solid var(--yellow); }
.week-card.p3 { border-left: 3px solid var(--green); }
.week-card.p4 { border-left: 3px solid var(--red); }
.week-card.p5 { border-left: 3px solid var(--cyan); }

.week-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}

.week-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px;
  font-weight: 900;
  color: var(--muted);
  line-height: 1;
  min-width: 42px;
  text-align: center;
}

.week-card.current .week-num { color: var(--cyan); }
.week-card.p5 .week-num { color: var(--cyan); }

.week-num-sub {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: center;
}

.week-meta {
  flex: 1;
}

.week-dates {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 2px;
}

.week-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.week-badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}

.badge-regen  { background: var(--yellow-dim); color: var(--yellow); }
.badge-jak    { background: var(--cyan-dim); color: var(--cyan); }
.badge-bud    { background: var(--green-dim); color: var(--green); }
.badge-szczyt { background: var(--orange-dim); color: var(--orange); }
.badge-test   { background: var(--red-dim); color: var(--red); }
.badge-start  { background: rgba(61,214,140,.2); color: var(--green); }
.badge-now    { background: var(--cyan); color: var(--bg); }
.badge-done   { background: var(--subtle); color: var(--muted); }

.chevron {
  color: var(--muted);
  font-size: 14px;
  transition: transform .25s;
  flex-shrink: 0;
}

.week-card.open .chevron { transform: rotate(180deg); }

/* ── WEEK BODY ── */
.week-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px 16px 16px;
}

.week-card.open .week-body { display: block; }

.days-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}

.day-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}

.day-cell.rest {
  opacity: .35;
  background: transparent;
  border-style: dashed;
}

.day-cell.key {
  border-top: 2px solid var(--orange);
}

.day-cell.race {
  border-top: 2px solid var(--yellow);
  background: rgba(255,209,102,.04);
}

.day-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.day-content {
  font-size: 12px;
  color: var(--text);
  line-height: 1.55;
  white-space: pre-line;
}

.done-btn {
  background: none;
  border: 1px solid var(--subtle);
  color: var(--muted);
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s;
}

.done-btn:hover { border-color: var(--green); color: var(--green); }
.week-card.done .done-btn { border-color: var(--green); color: var(--green); background: var(--green-dim); }

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .days-grid { grid-template-columns: 1fr 1fr; }
  h1 { font-size: 36px; }
  .header-meta { gap: 14px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>

          'Pt': null,
          'Sob': '25 min BS\n+ 4x100m przebieżki',
          'Nd': '10km BS (luz)\n\n🏁 START GDAŃSK 27.09!\nCEL: sub 1:50'
        }},
    ]
  }
];

// ── Pomocnicze ──
function getDaysTo() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((RACE - today) / 86400000));
}

function getCurrentWeekIdx() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - PLAN_START) / 86400000);
  return diff < 0 ? -1 : Math.floor(diff / 7);
}

function getDone() {
  try { return JSON.parse(localStorage.getItem('gdansk_done') || '[]'); } catch { return []; }
}

function saveDone(arr) {
  try { localStorage.setItem('gdansk_done', JSON.stringify(arr)); } catch {}
}

function badgeFor(typ) {
  const map = {
    regen: ['badge-regen','⚡ Regeneracja'],
    jak:   ['badge-jak','Jakościowy'],
    bud:   ['badge-bud','Budowanie'],
    szczyt:['badge-szczyt','Szczyt'],
    test:  ['badge-test','🏁 Test 10K'],
    start: ['badge-start','🏁 Start'],
  };
  return map[typ] || ['badge-jak',''];
}

function weekLabel(typ) {
  const map = {
    regen:'Regeneracja', jak:'Jakościowy', bud:'Budowanie',
    szczyt:'Szczyt', test:'TEST 10K', start:'START'
  };
  return map[typ] || typ;
}

// ── Render ──
function render() {
  const plan = document.getElementById('plan');
  const allWeeks = phases.flatMap(p => p.weeks);
  const totalWeeks = allWeeks.length;
  const currentIdx = getCurrentWeekIdx();
  const done = getDone();

  plan.innerHTML = '';

  let globalIdx = 0;
  phases.forEach(phase => {
    const phDiv = document.createElement('div');
    phDiv.className = `phase-header ${phase.id}`;
    phDiv.innerHTML = `<span class="phase-icon">${phase.icon}</span><span class="phase-title">${phase.title}</span><span style="font-size:11px;color:var(--muted);margin-left:auto">${phase.dates}</span>`;
    plan.appendChild(phDiv);

    phase.weeks.forEach(week => {
      const isCurrent = globalIdx === currentIdx;
      const isDone = done.includes(week.id);
      const weekNum = totalWeeks - globalIdx;

      const card = document.createElement('div');
      card.className = `week-card ${phase.id.replace('p','p')}${isCurrent?' current':''}${isDone?' done':''}`;
      card.classList.add(phase.id);
      if (isCurrent) card.classList.add('open');

      const [badgeClass, badgeLabel] = badgeFor(week.typ);
      let badges = `<span class="badge ${badgeClass}">${badgeLabel}</span>`;
      if (isCurrent) badges += `<span class="badge badge-now">Ten tydzień</span>`;
      if (isDone)    badges += `<span class="badge badge-done">✓</span>`;

      // Days
      const dayOrder = ['Pn','Wt','Śr','Czw','Pt','Sob','Nd'];
      const dayNames = {'Pn':'Poniedziałek','Wt':'Wtorek','Śr':'Środa','Czw':'Czwartek','Pt':'Piątek','Sob':'Sobota','Nd':'Niedziela'};

      let daysHTML = '';
      dayOrder.forEach(d => {
        const content = week.days[d];
        if (!content) {
          daysHTML += `<div class="day-cell rest"><div class="day-name">${dayNames[d]}</div><div class="day-content" style="color:var(--muted);font-size:11px">odpoczynek</div></div>`;
        } else {
          const isKey = d === 'Czw' || (d === 'Nd' && (week.typ === 'test' || week.typ === 'start'));
          const isRace = week.typ === 'start' && d === 'Nd';
          daysHTML += `<div class="day-cell${isKey?' key':''}${isRace?' race':''}"><div class="day-name">${dayNames[d]}</div><div class="day-content">${content}</div></div>`;
        }
      });

      card.innerHTML = `
        <div class="week-header" onclick="toggleWeek(this)">
          <div>
            <div class="week-num">${weekNum}</div>
            <div class="week-num-sub">tyg.</div>
          </div>
          <div class="week-meta">
            <div class="week-dates">${week.id} · ${week.dates}</div>
            <div class="week-label">${week.label}</div>
            <div class="week-badges">${badges}</div>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="week-body">
          <div class="days-grid">${daysHTML}</div>
          <button class="done-btn" onclick="toggleDone('${week.id}',event)">
            ${isDone ? '✓ Zrobiony' : 'Oznacz jako zrobiony'}
          </button>
        </div>`;

      plan.appendChild(card);
      globalIdx++;
    });
  });

  // Progress
  const doneCount = done.length;
  document.getElementById('prog-text').textContent = `${doneCount} / ${totalWeeks} tygodni`;
  document.getElementById('prog-fill').style.width = `${(doneCount/totalWeeks)*100}%`;
}

function toggleWeek(header) {
  header.closest('.week-card').classList.toggle('open');
}

function toggleDone(id, e) {
  e.stopPropagation();
  let done = getDone();
  done = done.includes(id) ? done.filter(i=>i!==id) : [...done, id];
  saveDone(done);
  render();
}

function updateCountdown() {
  const days = getDaysTo();
  document.getElementById('cd-days').textContent = days;
  document.getElementById('cd-weeks').textContent = Math.ceil(days/7);
}

updateCountdown();
render();
setInterval(updateCountdown, 60000);
</script>
</body>
</html>
